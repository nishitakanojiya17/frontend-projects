{% extends 'base.html' %}
{% block title %}Admin Dashboard — Campus Mitra{% endblock %}
{% block content %}
<style>
  body{background:#f0f2f8;}
  .topbar{background:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;}
  .topbar h2{font-size:20px;font-weight:700;}
  .logout{padding:8px 16px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;}
  .content{padding:32px;}
  .hero{background:linear-gradient(135deg,#1c1c2e,#2a2a42);border-radius:20px;padding:28px 32px;color:white;margin-bottom:24px;border:1px solid rgba(245,200,66,0.2);}
  .hero h1{font-size:28px;font-weight:800;margin-bottom:6px;color:#f5c842;}
  .hero p{opacity:0.6;font-size:14px;}
  .actions{display:flex;gap:12px;flex-wrap:wrap;}
  .btn{padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;}
  .btn-gold{background:#f5c842;color:#1c1c2e;}
  .btn-blue{background:#4f8ef7;color:white;}
</style>
<div class="topbar">
  <h2>🛡️ Admin Control Panel</h2>
  <a href="{% url 'logout' %}" class="logout">⏻ Logout</a>
</div>
<div class="content">
  <div class="hero">
    <h1>{{ request.user.get_full_name }}</h1>
    <p>System Administrator · Indore Institute of Science and Technology</p>
  </div>
  <div class="actions">
    <a href="/admin/" class="btn btn-gold">⚙️ Django Admin Panel</a>
    <a href="{% url 'notes_list' %}" class="btn btn-blue">📚 Manage Notes</a>
  </div>
</div>
{% endblock %}
